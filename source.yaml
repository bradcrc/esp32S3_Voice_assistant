esphome:
  name: esps3
  friendly_name: ESPS3

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3  
  flash_size: 16MB
  framework:
    type: esp-idf

    version: recommended
    sdkconfig_options:
      # ESP32-S3 N16R8
      CONFIG_ESP32_S3_BOX_BOARD: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB:      "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B:  "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y" 

psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password


# Enable Home Assistant API
api:
  on_client_connected:
        then:
          - delay: 50ms
          - light.turn_off: led_ww
          - micro_wake_word.start:
  on_client_disconnected:
        then:
          - voice_assistant.stop: 




###############################################################################################################################

audio_file:
  - id: alert_sound
    file:
      type: local
      path: "audio/pop.mp3"


i2s_audio:
  - id: mic_i2s
    i2s_lrclk_pin: GPIO01
    i2s_bclk_pin: GPIO05
    
  - id: spk_i2s
    i2s_lrclk_pin: GPIO06
    i2s_bclk_pin: GPIO07

microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: mic_i2s
    adc_type: external        
    i2s_din_pin: GPIO04
    channel: left    
    pdm: false

speaker:
  - platform: i2s_audio
    id: big_speaker
    i2s_audio_id: spk_i2s
    i2s_dout_pin: GPIO14
    dac_type: external
    

  - platform: mixer
    id: mixer_speaker_id
    output_speaker: big_speaker
    num_channels: 2
    source_speakers:
      - id: announcement_spk_mixer_input
      - id: media_spk_mixer_input

  - platform: resampler
    id: media_spk_resampling_input
    output_speaker: media_spk_mixer_input

  - platform: resampler
    id: announcement_spk_resampling_input
    output_speaker: announcement_spk_mixer_input



media_player:
   - platform: speaker
     id: esps3_media_player
     name: ESP S3 Media Player

     announcement_pipeline:
       speaker: announcement_spk_resampling_input 
       num_channels: 1
       format: MP3

     media_pipeline:
       speaker: media_spk_resampling_input
       format: MP3
       num_channels: 1


     on_announcement:
       - logger.log: "** MP Announcing! ** "
       - light.turn_on:
           id: led_ww           
           red: 30%
           green: 30%
           blue: 70%
           brightness: 100%
           effect: "Slow Pulse"

     on_play:
       - logger.log: "** MP Playback started! **"       
       - light.turn_on:
           id: led_ww           
           red: 30%
           green: 30%
           blue: 70%
           brightness: 70%
           effect: "Random X"
        
     on_idle:
       - logger.log: "** MP Playback finished! ** "
       - light.turn_off: led_ww







################################################################################################################################

voice_assistant:
  id: assist
  microphone: mic

  micro_wake_word: mww

  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 3.0
  media_player: esps3_media_player  


  on_error:
    - logger.log: "** VA ERROR **"    
    - micro_wake_word.start:  
    - delay: 1s      
    - light.turn_on:
        id: led_ww           
        red: 100%
        green: 0%
        blue: 0%
        brightness: 80%
        effect: "V Fast Pulse"
    - delay: 3s
    - light.turn_off:
        id: led_ww 


  on_end:
    - logger.log: "** VA END **"        
    - light.turn_off: led_ww
    - wait_until:
        not:
          voice_assistant.is_running:
    - micro_wake_word.start:      

  on_stt_end:
    - logger.log: "** STT END **"
    - light.turn_off: led_ww    

  on_tts_start:
    - logger.log: "** TTS START **"   






###############################################################################################################################

switch:

  - platform: restart
    name: "Restart Device"

  - platform: template
    id: mute
    name: mute
    optimistic: true
    on_turn_on: 
      - micro_wake_word.stop:
      - voice_assistant.stop:
      - light.turn_on:
          id: led_ww           
          red: 100%
          green: 0%
          blue: 0%
          brightness: 60%
          effect: "V Fast Pulse" 
      - delay: 2s
      - light.turn_off:
          id: led_ww
      - light.turn_on:
          id: led_ww           
          red: 100%
          green: 0%
          blue: 0%
          brightness: 30%
    on_turn_off:
      - micro_wake_word.start:
      - light.turn_on:
          id: led_ww           
          red: 0%
          green: 100%
          blue: 0%
          brightness: 60%
          effect: "V Fast Pulse"
      - delay: 2s
      - light.turn_off:
          id: led_ww 



 


###############################################################################################################################

micro_wake_word:
  id: mww
  microphone:
    microphone: mic
    channels: 0
    gain_factor: 4
  vad:
  models:
    - model: okay_nabu
      id: okay_nabu_model
    - model: hey_jarvis
      id: hey_jarvis_model

  on_wake_word_detected:
    - logger.log: "** WAKE WORD DETECTED**"       
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

    - media_player.speaker.play_on_device_media_file:
        media_file: alert_sound
        announcement: false

    - delay: 500ms             
    - light.turn_on:
        id: led_ww           
        red: 10%
        green: 80%
        blue: 40%
        brightness: 100%
        effect: "Fast Pulse"


###############################################################################################################################

light:
  - platform: esp32_rmt_led_strip
    id: led_ww
    rgb_order: GRB
    pin: GPIO48
    num_leds: 1
    chipset: ws2812
    name: "on board light"

    effects:
      - pulse:
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.45s
          update_interval: 0.45s
          min_brightness: 0%
          max_brightness: 100%
          
      - pulse:
          name: "Slow Pulse"
          transition_length: 2.0s
          update_interval: 2.0s
          min_brightness: 0%
          max_brightness: 100%

      - pulse:
          name: "V Fast Pulse"
          transition_length: 0.25s
          update_interval: 0.25s
          min_brightness: 0%
          max_brightness: 100%

      # Random color and interval good for music
      - random:  
      - random:
          name: "Random X"
          transition_length: 3s
          update_interval: 4s
